<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Calculator MX Icon</title>
  <desc id="desc">A dark Calculator MX app icon with orange MX lettering.</desc>
  <defs>
    <radialGradient id="glow" cx="50%" cy="45%" r="62%">
      <stop offset="0" stop-color="#50545a"/>
      <stop offset="0.44" stop-color="#24272b"/>
      <stop offset="1" stop-color="#111315"/>
    </radialGradient>
    <linearGradient id="orange" x1="258" y1="345" x2="766" y2="676" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ff9f1a"/>
      <stop offset="0.52" stop-color="#f47b00"/>
      <stop offset="1" stop-color="#b94a00"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.65"/>
    </filter>
    <filter id="innerShade" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#ffffff" flood-opacity="0.08"/>
      <feDropShadow dx="0" dy="-18" stdDeviation="24" flood-color="#000000" flood-opacity="0.7"/>
    </filter>
  </defs>
  <rect width="1024" height="1024" rx="190" fill="#17191c"/>
  <rect x="62" y="62" width="900" height="900" rx="154" fill="#202327"/>
  <rect x="104" y="104" width="816" height="816" rx="118" fill="url(#glow)" filter="url(#innerShade)"/>
  <path d="M142 180h740M142 224h740M142 268h740M142 756h740M142 800h740M142 844h740" stroke="#3b3f45" stroke-width="12" opacity="0.35"/>
  <text x="512" y="296" text-anchor="middle" fill="#f3f4f6" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="62" font-weight="500" letter-spacing="8">CALCULATOR</text>
  <g filter="url(#shadow)">
    <text x="512" y="655" text-anchor="middle" fill="url(#orange)" font-family="Avenir Next Condensed, Helvetica, Arial, sans-serif" font-size="360" font-weight="800" letter-spacing="-18">MX</text>
  </g>
  <rect x="361" y="734" width="302" height="13" rx="7" fill="#ffb21c"/>
</svg>

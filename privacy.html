<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Calculator MX Privacy Policy</title>
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.svg">
  <style>
    :root {
      color-scheme: light;
      --background: #f6f7f9;
      --surface: #ffffff;
      --text: #1f2933;
      --muted: #5d6875;
      --border: #d9dee7;
      --accent: #0f766e;
      --accent-dark: #115e59;
      --shadow: 0 18px 45px rgba(31, 41, 51, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(135deg, rgba(15, 118, 110, 0.12), transparent 34rem),
        var(--background);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.6;
    }

    .page {
      width: min(100% - 2rem, 760px);
      margin: 0 auto;
      padding: 4rem 0;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: clamp(1.5rem, 5vw, 3rem);
    }

    .eyebrow {
      margin: 0 0 0.5rem;
      color: var(--accent-dark);
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 0.5rem 0 0;
    }

    .app-icon {
      width: clamp(3rem, 12vw, 4.25rem);
      height: clamp(3rem, 12vw, 4.25rem);
      border-radius: 22%;
      box-shadow: 0 10px 25px rgba(15, 118, 110, 0.2);
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 8vw, 3.25rem);
      line-height: 1.1;
    }

    .lead {
      margin: 1rem 0 0;
      color: var(--muted);
      font-size: 1.1rem;
    }

    .privacy-box {
      margin: 2rem 0;
      padding: 1.25rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fbfcfd;
    }

    .privacy-box p {
      margin: 0;
    }

    a {
      color: var(--accent-dark);
      font-weight: 700;
      text-decoration: none;
    }

    a:hover,
    a:focus {
      text-decoration: underline;
    }

    nav {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem 1.25rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }

    footer {
      margin-top: 1.5rem;
      color: var(--muted);
      font-size: 0.9rem;
      text-align: center;
    }

    @media (max-width: 520px) {
      .page {
        width: min(100% - 1rem, 760px);
        padding: 1rem 0;
      }

      .brand {
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="panel" aria-labelledby="privacy-title">
      <p class="eyebrow">Privacy Policy</p>
      <div class="brand">
        <img class="app-icon" src="icon.svg" alt="" width="68" height="68">
        <h1 id="privacy-title">Calculator MX</h1>
      </div>
      <p class="lead">Privacy information for Calculator MX.</p>

      <div class="privacy-box">
        <p>Calculator MX does not collect, store, sell, or share personal data.</p>
      </div>

      <nav aria-label="Page links">
        <a href="index.html">Support</a>
      </nav>
    </section>

    <footer>
      <p>&copy; 2026 Calculator MX</p>
    </footer>
  </main>
</body>
</html>
